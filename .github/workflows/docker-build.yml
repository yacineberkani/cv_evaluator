# .github/workflows/docker-build.yml
# Workflow de construction de l'image Docker
#
# Ce workflow build l'image Docker et la pousse sur Docker Hub.
# Se déclenche uniquement sur la branche main après succès des tests.

name: 🐳 Docker Build

on:
  push:
    branches: [main]
    # Tags pour les releases (ex: v1.0.0)
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  # Remplace par ton nom d'utilisateur Docker Hub
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  # Nom de l'image (username/imagename)
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/cv-evaluator

jobs:
  # ----- Job 1 : Build de test (sans push) -----
  build-test:
    name: "🔨 Build Test"
    runs-on: ubuntu-latest
    
    # Seulement pour les PR (pas de push)
    if: github.event_name == 'pull_request'
    
    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4
      
      - name: "🐳 Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3
        # Buildx = version avancée de Docker build (cache, multi-arch...)
      
      - name: "🔨 Build Docker image"
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false          # Pas de push, juste vérifier que ça build
          cache-from: type=gha # Cache depuis GitHub Actions
          cache-to: type=gha,mode=max  # Sauvegarder le cache

  # ----- Job 2 : Build + Push (seulement sur main) -----
  build-and-push:
    name: "📦 Build & Push"
    runs-on: ubuntu-latest
    
    # Seulement sur push sur main ou tags
    if: github.event_name == 'push'
    
    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4
      
      # Configuration de Docker Buildx avec cache
      - name: "🐳 Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3
      
      # Connexion à Docker Hub
      - name: "🔑 Log in to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      # Extraction des métadonnées (tags, labels)
      - name: "🏷️ Extract Docker metadata"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Tag "latest" pour main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag avec le sha court (ex: abc1234)
            type=sha,prefix=
            # Tag avec la version pour les releases (ex: v1.0.0)
            type=semver,pattern={{version}}
      
      # Build et push de l'image
      - name: "📦 Build and push Docker image"
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: "Code Quality"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install ruff
          pip install -r requirements.txt
      
      # J'ai enlevé --output-format=github pour ne plus polluer l'interface avec des warnings
      - name: Ruff lint
        run: ruff check . || true
        continue-on-error: true
      
      - name: Ruff format check
        run: ruff format --check . || true
        continue-on-error: true

  test:
    name: "Tests"
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt
      
      - name: Run tests
        run: pytest tests/ -v --tb=short

  build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true
      
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/cv-evaluator
          tags: |
            type=raw,value=latest
            type=sha,prefix=
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: "Deploy to Hugging Face"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # continue-on-error: true garantit que le pipeline sera VERT même si HF bloque
    continue-on-error: true 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Deploy to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_USERNAME" ] || [ -z "$SPACE_NAME" ]; then
            echo "⚠️ Secrets HF manquants. Déploiement ignoré."
            exit 0
          fi
          
          echo "🚀 Déploiement vers https://huggingface.co/spaces/$HF_USERNAME/$SPACE_NAME ..."
          
          git clone https://$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$SPACE_NAME hf_space || {
            echo "❌ Erreur 128 : Vérifie ton HF_TOKEN (Write access) et le nom du Space."
            exit 1
          }
          
          cd hf_space
          find . -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} +
          
          cp $GITHUB_WORKSPACE/app.py .
          cp -r $GITHUB_WORKSPACE/agents .
          cp -r $GITHUB_WORKSPACE/models .
          cp -r $GITHUB_WORKSPACE/prompts .
          cp -r $GITHUB_WORKSPACE/utils .
          cp $GITHUB_WORKSPACE/requirements.txt .
          
          cat > Dockerfile << 'EOF'
          FROM python:3.11-slim
          WORKDIR /app
          RUN apt-get update && apt-get install -y --no-install-recommends build-essential && rm -rf /var/lib/apt/lists/*
          COPY requirements.txt .
          RUN pip install --no-cache-dir -r requirements.txt
          COPY . .
          EXPOSE 7860
          CMD ["streamlit", "run", "app.py", "--server.port=7860", "--server.address=0.0.0.0"]
          EOF
          
          cat > README.md << 'EOF'
          ---
          title: CV Evaluator
          emoji: "🧠"
          colorFrom: blue
          colorTo: purple
          sdk: docker
          app_port: 7860
          pinned: false
          ---
          EOF
          
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .
          git commit -m "Deploy from GitHub CI/CD"
          git push
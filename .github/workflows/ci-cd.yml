name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ==========================================
  # JOB 1 : QUALITÉ
  # ==========================================
  quality:
    name: "Code Quality"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: "Install deps"
        run: pip install ruff && pip install -r requirements.txt
      - name: "Ruff lint"
        run: ruff check . || true
        continue-on-error: true
      - name: "Ruff format check"
        run: ruff format --check . || true
        continue-on-error: true

  # ==========================================
  # JOB 2 : TESTS
  # ==========================================
  test:
    name: "Tests"
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: "Install deps"
        run: pip install pytest && pip install -r requirements.txt
      - name: "Run tests"
        run: pytest tests/ -v

  # ==========================================
  # JOB 3 : BUILD DOCKER
  # ==========================================
  build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      
      - name: "Setup Docker Buildx"
        uses: docker/setup-buildx-action@v3
      
      - name: "Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true
      
      - name: "Docker metadata"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/cv-evaluator
          tags: |
            type=raw,value=latest
            type=sha,prefix=
      
      - name: "Build Docker image"
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ secrets.DOCKER_USERNAME != '' }}
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # JOB 4 : DÉPLOIEMENT HUGGING FACE
  # ==========================================
  deploy:
    name: "Deploy to Hugging Face"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true 
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      
      - name: "Deploy to HF"
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_USERNAME" ] || [ -z "$SPACE_NAME" ]; then
            echo "⚠️ Secrets HF manquants."
            exit 0
          fi
          
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global credential.helper store
          echo "https://hf_user:${HF_TOKEN}@huggingface.co" > ~/.git-credentials
          
          git clone https://huggingface.co/spaces/$HF_USERNAME/$SPACE_NAME hf_space
          cd hf_space
          
          # On vide le dossier du Space
          git rm -rf . || true
          git clean -fdx || true
          
          # Copie du projet dans un temporaire pour éviter les erreurs
          cp -r $GITHUB_WORKSPACE /tmp/workspace_copy
          rm -rf /tmp/workspace_copy/.git
          
          # Copie de tout le contenu (y compris le fichier .env caché)
          cp -a /tmp/workspace_copy/. .
          
          # On nettoie ce qui ne sert pas sur Hugging Face
          rm -rf venv tests .github __pycache__ .pytest_cache .dockerignore
          
          # Création du Dockerfile Hugging Face avec echo (sans problème d'indentation)
          echo "FROM python:3.11-slim" > Dockerfile
          echo "WORKDIR /app" >> Dockerfile
          echo "RUN apt-get update && apt-get install -y --no-install-recommends build-essential && rm -rf /var/lib/apt/lists/*" >> Dockerfile
          echo "COPY requirements.txt ." >> Dockerfile
          echo "RUN pip install --no-cache-dir -r requirements.txt" >> Dockerfile
          echo "COPY .env ." >> Dockerfile
          echo "COPY . ." >> Dockerfile
          echo "EXPOSE 7860" >> Dockerfile
          echo 'CMD ["streamlit", "run", "app.py", "--server.port=7860", "--server.address=0.0.0.0"]' >> Dockerfile
          
          # Création du README Hugging Face
          echo "---" > README.md
          echo "title: CV Evaluator" >> README.md
          echo 'emoji: "🧠"' >> README.md
          echo "colorFrom: blue" >> README.md
          echo "colorTo: purple" >> README.md
          echo "sdk: docker" >> README.md
          echo "app_port: 7860" >> README.md
          echo "pinned: false" >> README.md
          echo "---" >> README.md
          
          # Envoi sur Hugging Face
          git add .
          git commit -m "Deploy"
          git push
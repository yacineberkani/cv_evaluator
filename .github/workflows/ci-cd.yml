name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: "Code Quality"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install ruff
          pip install -r requirements.txt
      
      - name: Ruff lint
        run: ruff check . || true
        continue-on-error: true
      
      - name: Ruff format check
        run: ruff format --check . || true
        continue-on-error: true

  test:
    name: "Tests"
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt
      
      - name: Run tests
        run: pytest tests/ -v --tb=short

  build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true
      
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/cv-evaluator
          tags: |
            type=raw,value=latest
            type=sha,prefix=
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: "Deploy to Hugging Face"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Deploy to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
          MY_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_USERNAME" ] || [ -z "$SPACE_NAME" ]; then
            echo "⚠️ Secrets HF manquants. Déploiement ignoré."
            exit 0
          fi
          
          # Configuration Git
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global credential.helper store
          echo "https://hf_user:${HF_TOKEN}@huggingface.co" > ~/.git-credentials
          
          echo "🚀 Déploiement vers https://huggingface.co/spaces/$HF_USERNAME/$SPACE_NAME ..."
          git clone https://huggingface.co/spaces/$HF_USERNAME/$SPACE_NAME hf_space
          
          # On se place dans le Space
          cd hf_space
          
          # On vide le Space (sauf le dossier .git de HF)
          find . -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} +
          
          # ==========================================
          # 🚀 LA NOUVELLE MÉTHODE : ON COPIE TOUT !
          # ==========================================
          # On copie absolument tout le projet
          cp -r $GITHUB_WORKSPACE/* .
          
          # On supprime ce qui n'est pas utile pour l'application Streamlit
          rm -rf venv
          rm -rf .github
          rm -rf tests
          rm -rf .gitignore
          rm -rf docker-compose.prod.yml
          
          # ==========================================
          # On crée le fichier .env avec la clé
          # ==========================================
          echo "GOOGLE_API_KEY=$MY_API_KEY" > .env
          
          # ==========================================
          # On crée le Dockerfile
          # ==========================================
          cat > Dockerfile << 'EOF'
          FROM python:3.11-slim
          WORKDIR /app
          RUN apt-get update && apt-get install -y --no-install-recommends build-essential && rm -rf /var/lib/apt/lists/*
          COPY requirements.txt .
          RUN pip install --no-cache-dir -r requirements.txt
          COPY .env .
          COPY . .
          EXPOSE 7860
          CMD ["streamlit", "run", "app.py", "--server.port=7860", "--server.address=0.0.0.0"]
          EOF
          
          # ==========================================
          # On crée le README pour Hugging Face
          # ==========================================
          cat > README.md << 'EOF'
          ---
          title: CV Evaluator
          emoji: "🧠"
          colorFrom: blue
          colorTo: purple
          sdk: docker
          app_port: 7860
          pinned: false
          ---
          EOF
          
          # On envoie tout sur Hugging Face
          git add .
          git commit -m "Deploy full project from GitHub CI/CD"
          git push
          
          echo "✅ Déployé avec succès!"
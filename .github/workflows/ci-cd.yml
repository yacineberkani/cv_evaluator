name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ==========================================
  # JOB 1 : QUALITÉ
  # ==========================================
  quality:
    name: "Code Quality"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff && pip install -r requirements.txt
      - run: ruff check . || true
        continue-on-error: true
      - run: ruff format --check . || true
        continue-on-error: true

  # ==========================================
  # JOB 2 : TESTS
  # ==========================================
  test:
    name: "Tests"
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest && pip install -r requirements.txt
      - run: pytest tests/ -v

  # ==========================================
  # JOB 3 : BUILD DOCKER
  # ==========================================
  build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true
      
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/cv-evaluator
          tags: |
            type=raw,value=latest
            type=sha,prefix=
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ secrets.DOCKER_USERNAME != '' }}
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # JOB 4 : DÉPLOIEMENT HUGGING FACE
  # ==========================================
  deploy:
    name: "Deploy to Hugging Face"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true 
    steps:
      - uses: actions/checkout@v4
      
      - name: "Deploy to HF"
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_USERNAME" ] || [ -z "$SPACE_NAME" ]; then
            echo "⚠️ Secrets HF manquants."
            exit 0
          fi
          
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global credential.helper store
          echo "https://hf_user:${HF_TOKEN}@huggingface.co" > ~/.git-credentials
          
          git clone https://huggingface.co/spaces/$HF_USERNAME/$SPACE_NAME hf_space
          cd hf_space
          
          # On vide le Space (sauf .git)
          find . -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} +
          
          # On prend TOUT le projet GitHub (dont le fichier .env)
          rsync -av --exclude='.git' \
                     --exclude='venv' \
                     --exclude='tests' \
                     --exclude='.github' \
                     --exclude='__pycache__' \
                     --exclude='.pytest_cache' \
                     $GITHUB_WORKSPACE/ .
          
          # On écrase le Dockerfile avec celui spécifique à Hugging Face (Port 7860 obligatoire)
          cat > Dockerfile << 'EOF'
          FROM python:3.11-slim
          WORKDIR /app
          RUN apt-get update && apt-get install -y --no-install-recommends build-essential && rm -rf /var/lib/apt/lists/*
          COPY requirements.txt .
          RUN pip install --no-cache-dir -r requirements.txt
          COPY .env .
          COPY . .
          EXPOSE 7860
          CMD ["streamlit", "run", "app.py", "--server.port=7860", "--server.address=0.0.0.0"]
          EOF
          
          # On crée le README pour Hugging Face
          cat > README.md << 'EOF'
          ---
          title: CV Evaluator
          emoji: "🧠"
          colorFrom: blue
          colorTo: purple
          sdk: docker
          app_port: 7860
          pinned: false
          ---
          EOF
          
          git add .
          git commit -m "Deploy"
          git push
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ==========================================
  # JOB 1 : QUALITÉ
  # ==========================================
  quality:
    name: "Code Quality"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: "Install deps"
        run: pip install ruff && pip install -r requirements.txt
      - name: "Ruff lint"
        run: ruff check . || true
        continue-on-error: true
      - name: "Ruff format check"
        run: ruff format --check . || true
        continue-on-error: true

  # ==========================================
  # JOB 2 : TESTS
  # ==========================================
  test:
    name: "Tests"
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: "Install deps"
        run: pip install pytest && pip install -r requirements.txt
      - name: "Run tests"
        run: pytest tests/ -v

  # ==========================================
  # JOB 3 : BUILD DOCKER
  # ==========================================
  build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      
      - name: "Setup Docker Buildx"
        uses: docker/setup-buildx-action@v3
      
      - name: "Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true
      
      - name: "Docker metadata"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/cv-evaluator
          tags: |
            type=raw,value=latest
            type=sha,prefix=
      
      - name: "Build Docker image"
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ secrets.DOCKER_USERNAME != '' }}
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # JOB 4 : DÉPLOIEMENT HUGGING FACE
  # ==========================================
  deploy:
    name: "Deploy to Hugging Face"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Deploy to HF"
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_USERNAME" ] || [ -z "$SPACE_NAME" ]; then
            echo "⚠️ Secrets HF manquants."
            exit 0
          fi

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global credential.helper store
          echo "https://hf_user:${HF_TOKEN}@huggingface.co" > ~/.git-credentials

          # Cloner le Space dans un dossier temporaire hors du workspace
          TMP_HF=$(mktemp -d)
          git clone https://huggingface.co/spaces/$HF_USERNAME/$SPACE_NAME "$TMP_HF/hf_space"
          cd "$TMP_HF/hf_space"

          # Vider le dépôt
          git rm -rf . || true
          git clean -fdx || true

          # Copier le workspace en excluant les dossiers/fichiers sensibles
          rsync -av --exclude='.git' --exclude='hf_space' --exclude='.env' --exclude='venv' --exclude='tests' --exclude='.github' --exclude='__pycache__' --exclude='.pytest_cache' --exclude='.dockerignore' "$GITHUB_WORKSPACE/" .

          # Suppression explicite du .env si présent (sécurité)
          rm -f .env 2>/dev/null || true

          # Créer le README Hugging Face correct
          cat > README.md << 'YAML_EOF'
          ---
          title: CV Evaluator
          emoji: 📄
          colorFrom: blue
          colorTo: purple
          sdk: docker
          app_port: 7860
          pinned: false
          ---
          YAML_EOF

          # Commit et push
          git add .
          git commit -m "Deploy" || echo "Nothing to commit"
          git push
# .github/workflows/ci-cd.yml
# Pipeline CI/CD complet pour CV Evaluator

name: 🔄 CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/cv-evaluator

jobs:
  # ========================================
  # JOB 1 : QUALITÉ DU CODE
  # ========================================
  quality:
    name: "🔍 Code Quality"
    runs-on: ubuntu-latest
    
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
      
      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: "📦 Install deps"
        run: |
          pip install --upgrade pip
          pip install ruff
          pip install -r requirements.txt
      
      - name: "🧹 Ruff lint"
        run: ruff check . --output-format=github || true
        continue-on-error: true
      
      - name: "📐 Ruff format check"
        run: ruff format --check . || true
        continue-on-error: true

  # ========================================
  # JOB 2 : TESTS
  # ========================================
  test:
    name: "🧪 Tests"
    runs-on: ubuntu-latest
    needs: quality
    
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
      
      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: "📦 Install deps"
        run: |
          pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt
      
      - name: "🧪 Run tests"
        run: pytest tests/ -v --tb=short

  # ========================================
  # JOB 3 : BUILD DOCKER
  # ========================================
  build:
    name: "🐳 Docker Build"
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
      
      - name: "🐳 Setup Docker Buildx"
        uses: docker/setup-buildx-action@v3
      
      - name: "🔑 Login to Docker Hub"
        if: secrets.DOCKER_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: "🏷️ Docker metadata"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=
      
      - name: "🔨 Build and push"
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ secrets.DOCKER_USERNAME != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================================
  # JOB 4 : DÉPLOIEMENT HUGGING FACE
  # ========================================
  deploy:
    name: "🚀 Deploy to Hugging Face"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.HF_TOKEN != ''
    
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
      
      - name: "🤗 Deploy to Hugging Face"
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          echo "🚀 Déploiement vers Hugging Face Spaces..."
          git clone https://$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$SPACE_NAME hf_space
          cd hf_space
          
          find . -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} +
          
          cp $GITHUB_WORKSPACE/app.py .
          cp -r $GITHUB_WORKSPACE/agents .
          cp -r $GITHUB_WORKSPACE/models .
          cp -r $GITHUB_WORKSPACE/prompts .
          cp -r $GITHUB_WORKSPACE/utils .
          cp $GITHUB_WORKSPACE/requirements.txt .
          
          cat > Dockerfile << 'EOF'
          FROM python:3.11-slim
          WORKDIR /app
          RUN apt-get update && apt-get install -y --no-install-recommends build-essential && rm -rf /var/lib/apt/lists/*
          COPY requirements.txt .
          RUN pip install --no-cache-dir -r requirements.txt
          COPY . .
          EXPOSE 7860
          CMD ["streamlit", "run", "app.py", "--server.port=7860", "--server.address=0.0.0.0"]
          EOF
          
          cat > README.md << 'EOF'
          ---
          title: CV Evaluator
          emoji: 🧠
          colorFrom: blue
          colorTo: purple
          sdk: docker
          app_port: 7860
          pinned: false
          ---
          # 🧠 CV Evaluator
          EOF
          
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .
          git commit -m "Deploy from GitHub CI/CD"
          git push